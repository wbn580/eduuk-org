<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <style>
      .bg { fill: #1e3a8a; }
      .fg { fill: #ffffff; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #3b82f6; }
        .fg { fill: #0f172a; }
      }
    </style>
  </defs>
  <rect class="bg" width="64" height="64" rx="12"/>
  <!-- Stylized graduation cap representing UK education -->
  <g class="fg">
    <!-- Cap base -->
    <path d="M14 32 L32 20 L50 32 L48 34 L32 24 L16 34 Z"/>
    <!-- Mortarboard -->
    <path d="M10 36 L54 36 L54 38 L10 38 Z"/>
    <!-- Tassel -->
    <line x1="32" y1="38" x2="32" y2="48" stroke="currentColor" stroke-width="2"/>
    <circle cx="32" cy="50" r="2"/>
  </g>
</svg>
